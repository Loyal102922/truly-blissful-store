<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Cancelled | TRULY BLISSFUL</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center px-6">
  <div class="max-w-xl w-full text-center bg-neutral-900 border border-white/10 rounded-2xl p-8">
    <p class="text-orange-400 uppercase tracking-[0.25em] text-sm mb-3">Checkout Cancelled</p>
    <h1 class="text-4xl font-black mb-4">No worries.</h1>
    <p class="text-gray-300 mb-8">
      Your checkout was cancelled. Your cart is still waiting for you.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="/#cart" class="bg-orange-500 hover:bg-orange-400 transition px-6 py-3 rounded-xl text-black font-bold">
        Return to Cart
      </a>
      <a href="/" class="border border-white/20 hover:border-white/40 transition px-6 py-3 rounded-xl font-bold">
        Back to Store
      </a>
    </div>
  </div>
</body>
</html>
