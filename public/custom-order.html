<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Custom Order Request | TRULY BLISSFUL</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen font-sans">

  <div class="max-w-3xl mx-auto px-6 py-10">

    <a href="/"
       class="inline-block mb-6 bg-orange-500 hover:bg-orange-400 text-black px-5 py-2 rounded-xl font-bold">
      ← Back to Store
    </a>

    <h1 class="text-4xl font-bold mb-4">Custom Order Request</h1>

    <p class="text-gray-300 mb-8">
      Upload your logo, design, or inspiration image.
      We will review your request and reply by email with pricing and approval.
    </p>

    <form id="customOrderForm"
          class="space-y-5 bg-gray-900 p-6 rounded-2xl border border-gray-700">

      <input
        name="name"
        required
        placeholder="Your Name"
        class="w-full p-3 rounded-lg text-black"
      />

      <input
        name="email"
        type="email"
        required
        placeholder="Your Email"
        class="w-full p-3 rounded-lg text-black"
      />

      <select
        name="productType"
        required
        class="w-full p-3 rounded-lg text-black">

        <option value="">Choose Product Type</option>
        <option>T-Shirt</option>
        <option>Hoodie</option>
        <option>Sweatshirt</option>
        <option>Hat</option>
      </select>

      <input
        name="size"
        placeholder="Size e.g. Medium, Large, XL"
        class="w-full p-3 rounded-lg text-black"
      />

      <input
        name="color"
        placeholder="Preferred Color e.g. Black, White, Red"
        class="w-full p-3 rounded-lg text-black"
      />

      <textarea
        name="notes"
        rows="5"
        required
        placeholder="Describe what you want..."
        class="w-full p-3 rounded-lg text-black"></textarea>

      <div>
        <label class="block mb-2 font-bold">
          Upload Design / Logo / Inspiration Image
        </label>

        <input
          name="designImage"
          type="file"
          accept="image/*"
          required
          class="w-full bg-white text-black p-3 rounded-lg"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-orange-500 hover:bg-orange-400 text-black font-bold py-3 rounded-xl">

        Submit Custom Request
      </button>

    </form>

    <p id="message" class="mt-5 font-bold"></p>

  </div>

  <script>
    const form = document.getElementById('customOrderForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      message.textContent = 'Submitting request...';

      try {
        const res = await fetch('/custom-order', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (data.success) {
          message.textContent = 'Custom request submitted successfully!';
          message.className = 'mt-5 font-bold text-green-400';
          form.reset();
        } else {
          throw new Error(data.error || 'Submission failed');
        }

      } catch (err) {
        console.error(err);
        message.textContent = 'Failed to submit request.';
        message.className = 'mt-5 font-bold text-red-400';
      }
    });
  </script>

</body>
</html>
