<!DOCTYPE html>
<html>
<head>
  <title>Admin - Truly Blissful</title>
</head>

<body style="background:black;color:white;font-family:sans-serif;padding:20px;">

  <h1>Admin Panel</h1>

  <form id="productForm">
    <input name="name" placeholder="Product Name" required><br><br>
    <input name="price" placeholder="Price" required><br><br>
    <input type="file" name="image" accept="image/*" required><br><br>
    <button type="submit">Add Product</button>
  </form>

  <script>
    document.getElementById('productForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const password = prompt("Re-enter admin password:");
      const auth = btoa('admin:' + password);

      const formData = new FormData(this);

      const res = await fetch('/add-product', {
        method: 'POST',
        headers: {
          'Authorization': 'Basic ' + auth
        },
        body: formData
      });

      if (res.ok) {
        alert('Product added');
        this.reset();
      } else {
        alert('Failed to add product');
      }
    });
    async function loadProducts() {
  const res = await fetch('/products');
  const products = await res.json();

  const container = document.createElement('div');
  container.id = 'productsContainer';

  products.forEach(product => {
    const div = document.createElement('div');

    div.innerHTML = `
      <hr>
      <img src="${product.image}" width="120"><br>
      <strong>${product.name}</strong><br>
      $${product.price}<br><br>

      <button onclick="deleteProduct('${product._id}')">
        Delete
      </button>
    `;

    container.appendChild(div);
  });

  document.body.appendChild(container);
}

async function deleteProduct(id) {
  const password = prompt('Enter admin password');
  const auth = btoa('admin:' + password);

  const res = await fetch('/delete-product/' + id, {
    method: 'DELETE',
    headers: {
      Authorization: 'Basic ' + auth
    }
  });

  if (res.ok) {
    alert('Product deleted');
    location.reload();
  } else {
    alert('Delete failed');
  }
}

loadProducts();
  </script>

</body>
</html>
