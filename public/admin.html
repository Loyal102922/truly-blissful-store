<!DOCTYPE html>
<html>
<head>
  <title>Admin - Truly Blissful</title>
</head>

<body style="background:black;color:white;font-family:sans-serif;padding:20px;">

  <h1>Admin Panel</h1>

<form id="productForm" style="display: flex; flex-direction: column; gap: 12px; max-width: 350px;">
<input name="name" placeholder="Product Name" required style="padding: 10px;">
<input name="price" placeholder="Price" required style="padding: 10px;">
<input name="category" placeholder="Category e.g. Shirts, Hoodies, Headwear"required style="padding: 10px;">
  <input name="sizes" placeholder="Sizes e.g. M,L,XL,2XL" style="padding: 10px;">
<input name="colors" placeholder="Colors e.g. Black,White,Cream" style="padding: 10px;">
<input name="stock" type="number" placeholder="Stock Quantity" required style="padding: 10px;" />
<input type="file" name="images" accept="image/*" multiple style="color: white;">  
  
  <button 
    type="submit"
    style="background: orange; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer;"
  >
    Add Product
  </button>
</form>

  <script>
    document.getElementById('productForm').addEventListener('submit', async function(e) {
      e.preventDefault();

     const password = prompt("Enter admin password:");
      const auth = btoa('admin:' + password);

      const formData = new FormData(this);

      const res = await fetch('/add-product', {
        method: 'POST',
        headers: {
          'Authorization': 'Basic ' + auth
        },
        body: formData
      });

      if (res.ok) {
        alert('Product added');
this.reset();
loadProducts();
      } else {
        alert('Failed to add product');
      }
    });
    async function loadProducts() {
  const res = await fetch('/products');
  const products = await res.json();

  const container = document.createElement('div');
  container.id = 'productsContainer';

  products.forEach(product => {
    const div = document.createElement('div');

    div.innerHTML = `
      <hr>
      <div>
  ${(product.images || [product.image]).map(img => `
    <img src="${img}" width="120"><br>
  `).join('')}
</div>
      <strong>${product.name}</strong><br>
      $${product.price}<br><br>
Stock: ${product.stock || 0}<br><br>
      <button onclick="deleteProduct('${product._id}')">
  Delete
</button>

<button onclick="editProduct(
'${product._id}',
'${product.name}',
'${product.price}',
'${product.category}',
'${(product.sizes || []).join(', ')}',
'${(product.colors || []).join(', ')}',
'${product.stock || 0}',
)">
Edit
</button>
    `;

    container.appendChild(div);
  });

  document.body.appendChild(container);
}

async function deleteProduct(id) {
  const password = prompt('Enter admin password');
  const auth = btoa('admin:' + password);

  const res = await fetch('/delete-product/' + id, {
    method: 'DELETE',
    headers: {
      Authorization: 'Basic ' + auth
    }
  });

  if (res.ok) {
    alert('Product deleted');
    location.reload();
  } else {
    alert('Delete failed');
  }
}
async function editProduct(id, oldName, oldPrice, oldCategory, oldSizes, oldColors, oldStock) {

const name = prompt("New product name:", oldName);
const price = prompt("New product price:", oldPrice);
const category = prompt("Category:", oldCategory);
const sizes = prompt("Sizes (comma separated):", oldSizes);
const colors = prompt("Colors (comma separated):", oldColors);
const stock = prompt("Stock quantity:", oldStock || 0);
if (!name || !price) return;

const password = prompt("Enter admin password");
const auth = btoa("admin:" + password);

const res = await fetch('/edit-product/' + id, {
method: 'PUT',
headers: {
'Content-Type': 'application/json',
Authorization: 'Basic ' + auth
},
body: JSON.stringify({
  name,
  price,
  category,
  sizes: sizes.split(','),
  colors: colors.split(','),
  stock: Number(stock) || 0
})
});

if (res.ok) {
alert("Product updated");
location.reload();
} else {
alert("Update failed");
}
}
async function loadOrders() {
  const res = await fetch('/orders');
  const orders = await res.json();

  const ordersContainer = document.createElement('div');
  ordersContainer.innerHTML = '<h2 style="margin-top:40px;">Orders</h2>';

  orders.forEach(order => {
    const div = document.createElement('div');

    div.style.border = '1px solid white';
    div.style.padding = '15px';
    div.style.marginTop = '15px';
    div.style.borderRadius = '10px';

    const address = order.shippingAddress || {};

    div.innerHTML = `
      <div><strong>Status:</strong> ${order.status}</div>
      <div><strong>Email:</strong> ${order.customerEmail || ''}</div>
      <div><strong>Name:</strong> ${order.customerName || ''}</div>
      <div><strong>Phone:</strong> ${order.customerPhone || ''}</div>

      <div style="margin-top:10px;">
        <strong>Shipping Address:</strong><br>
        ${address.line1 || ''}<br>
        ${address.line2 || ''}<br>
        ${address.city || ''}, ${address.state || ''} ${address.postal_code || ''}<br>
        ${address.country || ''}
      </div>
<div style="margin-top:10px;">
  <strong>Items:</strong><br>
  ${(order.cart || []).map(item => `
    <div style="margin-top:6px; padding-left:10px;">
      ${item.name} × ${item.qty || 1}
      ${item.size ? `<br>Size: ${item.size}` : ''}
      ${item.color ? `<br>Color: ${item.color}` : ''}
    </div>
  `).join('')}
</div>
      <div style="margin-top:10px;">
        <strong>Total:</strong> $${order.total || 0}
      </div>
      <div style="margin-top:10px;">
  <a
    href="/invoice/${order._id}"
    target="_blank"
    style="display:inline-block;padding:8px 14px;background:white;color:black;border-radius:8px;font-weight:bold;text-decoration:none;"
  >
    View Invoice PDF
  </a>
</div>
      <div style="margin-top:15px;">
  <select id="status-${order._id}" style="padding:8px;border-radius:8px;">
    <option value="paid">Paid</option>
    <option value="processing">Processing</option>
    <option value="shipped">Shipped</option>
    <option value="delivered">Delivered</option>
  </select>

  <input
    id="tracking-${order._id}"
    placeholder="Tracking Number"
    style="padding:8px;border-radius:8px;margin-left:10px;"
  />

  <button
    onclick="updateOrderStatus('${order._id}')"
    style="padding:8px 14px;background:orange;color:black;border:none;border-radius:8px;margin-left:10px;font-weight:bold;"
  >
    Update Order
  </button>
</div>
    `;

    ordersContainer.appendChild(div);
  });

  document.body.appendChild(ordersContainer);
}
async function updateOrderStatus(orderId) {
  const status = document.getElementById(`status-${orderId}`).value;
  const tracking = document.getElementById(`tracking-${orderId}`).value;

  const res = await fetch(`/admin/orders/${orderId}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      status,
      trackingNumber: tracking
    })
  });

  const data = await res.json();

  if (res.ok) {
    alert('Order updated');
    location.reload();
  } else {
    alert(data.error || 'Failed to update order');
  }
}
loadOrders();
loadProducts();
</script>
