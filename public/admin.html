async function deleteProduct(id) {
  const password = prompt('Enter admin password');
  const auth = btoa('admin:' + password);

  const res = await fetch('/delete-product/' + id, {
    method: 'DELETE',
    headers: {
      Authorization: 'Basic ' + auth
    }
  });

  if (res.ok) {
    alert('Product deleted');
    location.reload();
  } else {
    alert('Delete failed');
  }
}
async function quickUpdate(id, field, value) {
  const password = prompt("Admin Password");
  if (!password) return;

  const auth = btoa("admin:" + password);

  const productRes = await fetch("/product/" + id);
  const product = await productRes.json();

  const formData = new FormData();

  formData.append("name", product.name);
  formData.append("price", product.price);
  formData.append("category", product.category);
  formData.append("sizes", (product.sizes || []).join(","));
  formData.append("colors", (product.colors || []).join(","));
  formData.append("stock", product.stock || 0);

  if (field === "price") formData.set("price", value);
  if (field === "stock") formData.set("stock", value);
  if (field === "sizes") formData.set("sizes", value);
  if (field === "colors") formData.set("colors", value);

  const res = await fetch("/edit-product/" + id, {
    method: "PUT",
    headers: {
      Authorization: "Basic " + auth
    },
    body: formData
  });

  if (res.ok) {
    alert("Updated");
    location.reload();
  } else {
    alert("Update failed");
  }
}

function quickEditStock(id, current) {
  const value = prompt("New Stock", current);
  if (value !== null) quickUpdate(id, "stock", value);
}

function quickEditPrice(id, current) {
  const value = prompt("New Price", current);
  if (value !== null) quickUpdate(id, "price", value);
}

function quickEditSizes(id, current) {
  const value = prompt("Sizes", current);
  if (value !== null) quickUpdate(id, "sizes", value);
}

function quickEditColors(id, current) {
  const value = prompt("Colors", current);
  if (value !== null) quickUpdate(id, "colors", value);
}
async function editProduct(id, oldName, oldPrice, oldCategory, oldSizes, oldColors, oldStock) {
  const name = prompt("New product name:", oldName);
  const price = prompt("New product price:", oldPrice);
  const category = prompt("Category:", oldCategory);
  const sizes = prompt("Sizes (comma separated):", oldSizes);
  const colors = prompt("Colors (comma separated):", oldColors);
  const stock = prompt("Stock quantity:", oldStock || 0);

  if (!name || !price) return;

  const changeImage = confirm("Do you want to update the product image?");
  let imageFiles = [];

if (changeImage) {
  const fileInput = document.createElement("input");
  fileInput.type = "file";
  fileInput.multiple = true;
  fileInput.accept = "image/*";

  fileInput.onchange = () => {
    imageFiles = fileInput.files;
    sendUpdate();
  };

  fileInput.click();
} else {
  sendUpdate();
}



async function sendUpdate() {
  const formData = new FormData();

  formData.append("name", name);
  formData.append("price", price);
  formData.append("category", category);
  formData.append("sizes", sizes);
  formData.append("colors", colors);
  formData.append("stock", Number(stock) || 0);

  for (let file of imageFiles) {
    formData.append("images", file);
  }

  const password = prompt("Enter admin password:");
  const auth = btoa("admin:" + password);

  const res = await fetch("/edit-product/" + id, {
    method: "PUT",
    headers: {
      Authorization: "Basic " + auth
    },
    body: formData
  });

  if (res.ok) {
    alert("Product updated");
    location.reload();
  } else {
    alert("Update failed");
  }
}

}

async function updateOrderStatus(orderId) {
  const status = document.getElementById(`status-${orderId}`).value;
  const tracking = document.getElementById(`tracking-${orderId}`).value;

  const res = await fetch(`/admin/orders/${orderId}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      status,
      trackingNumber: tracking
    })
  });

  const data = await res.json();

  if (res.ok) {
    alert('Order updated');
    location.reload();
  } else {
    alert(data.error || 'Failed to update order');
  }
}
async function removeProductImage(productId, imageUrl) {
  const password = prompt('Admin Password');
  if (!password) return;

  const res = await fetch(`/admin/products/${productId}/remove-image`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Basic ' + btoa(`admin:${password}`)
    },
    body: JSON.stringify({ imageUrl })
  });

  if (res.ok) {
    alert('Image deleted');
    loadProducts();
  } else {
    alert('Failed to delete image');
  }
}

async function saveReply(reviewId) {
  const reply =
    document.getElementById(`reply-${reviewId}`).value;

  const password = prompt('Admin Password');
  if (!password) return;

  const res = await fetch(
    `/reviews/${reviewId}/reply`,
    {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        reply,
        password
      })
    }
  );

  const data = await res.json();

  if (res.ok) {
    alert('Reply saved');
  } else {
    alert(data.error || 'Failed');
  }
}

async function addInventoryRow() {
  const productName = prompt("Product Name");
  if (!productName) return;

  const color = prompt("Color");
  if (!color) return;

  const size = prompt("Size (ONE SIZE ONLY)");
  if (!size) return;

  const quantity = prompt("Quantity");
  if (!quantity) return;

  const res = await fetch('/inventory', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      productName: productName.trim(),
      color: color.trim().toUpperCase(),
      size: size.trim().toUpperCase(),
      quantity: Number(quantity)
    })
  });

  const data = await res.json();

  if (res.ok) {
    alert('Inventory added');
    loadInventory();
  } else {
    alert(data.error || 'Failed to add inventory');
  }
}
