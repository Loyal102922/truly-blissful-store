<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Successful | TRULY BLISSFUL</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3WTM5EP175"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-3WTM5EP175');
  </script>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center px-6">
  <div class="max-w-xl w-full text-center bg-neutral-900 border border-white/10 rounded-2xl p-8">
    <p class="text-orange-400 uppercase tracking-[0.25em] text-sm mb-3">Order Confirmed</p>
    <h1 class="text-4xl font-black mb-4">Thank You.</h1>
    <p class="text-gray-300 mb-8">
      Your payment was successful and your order has been received.
    </p>
<div id="order-summary" class="mt-6 text-left bg-black/40 border border-white/10 rounded-xl p-4">
  <h2 class="font-bold text-lg mb-3">Order Summary</h2>
</div>
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="/" class="bg-orange-500 hover:bg-orange-400 transition px-6 py-3 rounded-xl text-black font-bold">
        Back to Store
      </a>
      <a href="/#products" class="border border-white/20 hover:border-white/40 transition px-6 py-3 rounded-xl font-bold">
        Keep Shopping
      </a>
    </div>
<script>
const cart = JSON.parse(localStorage.getItem('trulyBlissfulCart')) || [];
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session_id');

if (sessionId) {
  fetch('/order-details/' + sessionId)
    .then(res => res.json())
    .then(data => {
      console.log('ORDER DETAILS:', data);
    })
    .catch(err => console.error('Order details failed:', err));
}
const summary = document.getElementById('order-summary');

let total = 0;

cart.forEach(item => {
  total += item.price * (item.qty || 1);

  const div = document.createElement('div');

  div.className = "border-b border-white/10 py-3";

  div.innerHTML = `
    <div class="font-bold">${item.name}</div>
    <div class="text-sm text-gray-400">
      ${item.size || 'Standard'} / ${item.color || 'Standard'}
    </div>
    <div class="text-orange-400">
      $${item.price} × ${item.qty || 1}
    </div>
  `;

  summary.appendChild(div);
});

const totalDiv = document.createElement('div');

totalDiv.className = "pt-4 font-bold text-xl";

totalDiv.innerHTML = `Total: $${total}`;

summary.appendChild(totalDiv);

localStorage.removeItem('trulyBlissfulCart');
</script>
  </div>
</body>
</html>
