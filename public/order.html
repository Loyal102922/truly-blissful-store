<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Order - Truly Blissful</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen">
  <a href="/" class="inline-block m-6 bg-orange-500 hover:bg-orange-400 text-black font-bold px-6 py-3 rounded-xl">
    ← Back To Store
  </a>

  <div class="max-w-2xl mx-auto px-6 py-12">
    <h1 class="text-4xl font-bold mb-4">Track Your Order</h1>
    <p class="text-gray-300 mb-8">Enter your order email to check your status.</p>

    <input id="email" type="email" placeholder="Enter your email"
      class="w-full text-black p-4 rounded-xl mb-4" />

    <button onclick="trackOrder()"
      class="bg-orange-500 hover:bg-orange-400 text-black font-bold px-8 py-3 rounded-xl">
      Check Order
    </button>

    <div id="result" class="mt-10"></div>
  </div>

<script>
async function trackOrder() {
  const email = document.getElementById('email').value.trim();
  const result = document.getElementById('result');

  if (!email) {
    alert('Enter your email');
    return;
  }

  result.innerHTML = '<p>Loading order...</p>';

  try {
    const res = await fetch(`/track-order?email=${encodeURIComponent(email)}`);
    const data = await res.json();

    if (!res.ok || !data.order) {
      result.innerHTML = '<p class="text-red-500">No order found for this email.</p>';
      return;
    }

    const order = data.order;

    result.innerHTML = `
      <div class="border border-white/20 rounded-2xl p-6">
        <h2 class="text-2xl font-bold mb-4">Order Status</h2>

        <p><strong>Status:</strong> ${order.status || 'pending'}</p>
        <p><strong>Tracking:</strong> ${order.trackingNumber || 'Not available yet'}</p>
        <p><strong>Total:</strong> $${order.total || 0}</p>

        <div class="mt-6">
          <strong>Items:</strong>
          ${(order.cart || []).map(item => `
            <div class="mt-3 pl-3 border-l border-orange-500">
              ${item.name} × ${item.qty || 1}<br>
              ${item.size ? `Size: ${item.size}<br>` : ''}
              ${item.color ? `Color: ${item.color}` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } catch (err) {
    result.innerHTML = '<p class="text-red-500">Failed to load order.</p>';
  }
}
</script>

</body>
</html>
