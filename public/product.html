<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Details</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen">
<a href="/" class="inline-block m-6 bg-orange-500 hover:bg-orange-400 text-black px-5 py-2 rounded-xl font-bold">
  ← Back to Store
</a>
  <div class="max-w-6xl mx-auto px-6 py-10" id="productContainer">
    <p class="text-center text-xl">Loading product...</p>
  </div>

<script>

const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
let currentProduct = null;
async function loadProduct() {

  try {

    const res = await fetch(`/product/${productId}`);
    const product = await res.json();
currentProduct = product;
    const image =
      product.images?.[0] ||
      product.image ||
      '';

    document.getElementById('productContainer').innerHTML = `
    
      <div class="grid md:grid-cols-2 gap-10 items-start">

        <div>
          <img
            src="${image}"
            class="w-full rounded-2xl object-cover"
          />
        </div>

        <div>

          <h1 class="text-4xl font-bold mb-4">
            ${product.name}
          </h1>

          <p class="text-2xl mb-6">
            $${product.price}
          </p>

          <p class="mb-6 text-gray-300">
            ${product.category || ''}
          </p>

          <div class="mb-4">
            <strong>Sizes:</strong>
            ${(product.sizes || []).join(', ')}
          </div>

          <div class="mb-4">
            <strong>Colors:</strong>
            ${(product.colors || []).join(', ')}
          </div>

          <div class="mb-6">
            <strong>Stock:</strong>
            ${product.stock || 0}
          </div>

          
         <div class="mb-4">
  <label class="block mb-2 font-bold">Choose Size</label>
  <select id="selectedSize" class="text-black px-4 py-2 rounded-lg w-full max-w-xs">
    ${(product.sizes || ['Standard']).map(size => `
      <option value="${size}">${size}</option>
    `).join('')}
  </select>
</div>

<div class="mb-4">
  <label class="block mb-2 font-bold">Choose Color</label>
  <select id="selectedColor" class="text-black px-4 py-2 rounded-lg w-full max-w-xs">
    ${(product.colors || ['Standard']).map(color => `
      <option value="${color}">${color}</option>
    `).join('')}
  </select>
</div>

<div class="mb-6">
  <label class="block mb-2 font-bold">Quantity</label>
  <input id="selectedQty" type="number" min="1" value="1" class="text-black px-4 py-2 rounded-lg w-24">
</div>

<button onclick="addProductToCart()" class="bg-orange-500 hover:bg-orange-400 text-black px-8 py-3 rounded-xl font-bold">
  Add To Cart
</button>

        </div>

      </div>

    `;

  } catch (err) {

    document.getElementById('productContainer').innerHTML = `
      <p class="text-red-500 text-center text-2xl">
        Failed to load product
      </p>
    `;

  }

}
function addProductToCart() {
  if (!currentProduct) return;
const cart = JSON.parse(localStorage.getItem('trulyBlissfulCart')) || [];
 const selectedSize = document.getElementById('selectedSize')?.value || 'Standard';
const selectedColor = document.getElementById('selectedColor')?.value || 'Standard';
const selectedQty = Number(document.getElementById('selectedQty')?.value) || 1;
 const existing = cart.find(item =>
  item.name === currentProduct.name &&
  item.size === selectedSize &&
  item.color === selectedColor
);

  if (existing) {
  existing.qty = (existing.qty || 1) + selectedQty;
  } else {
    cart.push({
      name: currentProduct.name,
      price: currentProduct.price,
      image: currentProduct.images?.[0] || currentProduct.image || '',
   size: selectedSize,
color: selectedColor,
qty: selectedQty
    });
  }

  localStorage.setItem('trulyBlissfulCart', JSON.stringify(cart));
  alert('Added to cart');
}
loadProduct();

</script>

</body>
</html>
