<body class="bg-black text-white font-sans">

  <!-- HEADER -->

  <!-- HERO -->

  <!-- PRODUCTS -->
  <section id="products" class="px-6 pb-20 max-w-6xl mx-auto">
   <div class="grid md:grid-cols-2 xl:grid-cols-5 gap-8"> 

      <!-- TEE 1 -->

        <img src="product2.jpg" class="h-48 mx-auto mb-4"/>
        <h3 class="font-bold">The Cave Tee</h3>
        <p class="text-gray-400">$25</p>
        <button onclick="addToCart('The Cave Tee',25)" class="bg-orange-500 px-4 py-2 mt-4 rounded-xl text-black w-full">Add</button>
      </div>

      <!-- TEE 3 -->
      <div class="bg-neutral-900 p-6 rounded-xl text-center">
        <img src="product3.jpg" class="h-48 mx-auto mb-4"/>
        <h3 class="font-bold">Kingdom Come Tee</h3>
        <p class="text-gray-400">$25</p>
        <button onclick="addToCart('Kingdom Come Tee',25)" class="bg-orange-500 px-4 py-2 mt-4 rounded-xl text-black w-full">Add</button>
      </div>

      <!-- HAT -->
      <div class="bg-neutral-900 p-6 rounded-xl text-center">
        <img src="hat1.jpg" class="h-48 mx-auto mb-4"/>
        <h3 class="font-bold">TRULY BLISSFUL Hat</h3>
        <p class="text-gray-400">$20</p>
        <button onclick="addToCart('TRULY BLISSFUL Hat',20)" class="bg-orange-500 px-4 py-2 mt-4 rounded-xl text-black w-full">Add</button>
      </div>
<div class="bg-neutral-900 p-6 rounded-2xl text-center border border-white/10">
  <img src="hoodie1.jpg" alt="TRULY BLISSFUL Hoodie" class="h-56 mx-auto mb-4 object-contain"/>
  <h4 class="font-bold text-xl">TRULY BLISSFUL Hoodie</h4>
  <p class="text-gray-400 text-sm mb-4">Faith-forward heavyweight hoodie</p>

  <div class="space-y-3 mb-4">
    <select id="size-hoodie1" class="w-full rounded-xl bg-black border border-white/10 px-4 py-3 text-sm">
      <option>Small</option>
      <option>Medium</option>
      <option>Large</option>
      <option>XL</option>
      <option>2XL</option>
    </select>
    <select id="color-hoodie1" class="w-full rounded-xl bg-black border border-white/10 px-4 py-3 text-sm">
      <option>Black</option>
      <option>White</option>
      <option>Gray</option>
    </select>
  </div>

  <p class="text-orange-400 font-bold mb-4">$45</p>
  <button onclick="addToCart('TRULY BLISSFUL Hoodie',45)" class="bg-orange-500 px-4 py-3 rounded-xl text-black font-bold w-full">
    Add to Cart
  </button>
</div>
    </div>
  </section>

  <!-- CART -->
  <section class="max-w-3xl mx-auto px-6 pb-20">
    <div class="bg-neutral-900 p-6 rounded-xl">
      <h2 class="text-xl font-bold mb-4">Cart</h2>
      <ul id="cart-items"></ul>
      <p class="mt-4">Total: <span id="total">$0</span></p>

      <button onclick="checkout()" class="bg-orange-500 w-full mt-4 py-3 rounded-xl text-black font-bold">
        Checkout
      </button>
    </div>
  </section>

<script>
let cart = [];
let stripe;

async function initStripe() {
  const res = await fetch('/config');
  const data = await res.json();
  stripe = Stripe(data.publishableKey);
}

function addToCart(name, price) {
  cart.push({ name, price });
  renderCart();
}

function renderCart() {
  const list = document.getElementById('cart-items');
  const total = document.getElementById('total');
  list.innerHTML = '';
  let sum = 0;

  cart.forEach(item => {
    sum += item.price;
    const li = document.createElement('li');
    li.textContent = `${item.name} - $${item.price}`;
    list.appendChild(li);
  });

  total.textContent = '$' + sum;
}

async function checkout() {
  const res = await fetch('/create-checkout-session', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ cart })
  });

  const data = await res.json();
  stripe.redirectToCheckout({ sessionId: data.id });
}

initStripe();
</script>

</body>
</html>
