<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TRULY BLISSFUL</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://js.stripe.com/v3/"></script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body class="bg-black text-white font-sans">

<!-- HEADER -->
<header class="border-b border-white/10 sticky top-0 bg-black/95 backdrop-blur z-50">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <img src="/logo.png" class="h-12 w-auto"/>
      <h1 class="font-black text-lg">TRULY BLISSFUL</h1>
    </div>
    <a href="#products" class="bg-orange-500 px-4 py-2 rounded-xl text-black font-bold">Shop</a>
  </div>
</header>

<!-- HERO -->
<section class="text-center py-20 px-6">
  <h2 class="text-5xl font-black">Wear the Message</h2>
  <p class="text-gray-400 mt-4">Faith-driven streetwear built with purpose.</p>
</section>

<!-- PRODUCTS -->
<section id="products" class="px-6 pb-20 max-w-6xl mx-auto">
  <h2 class="text-3xl font-black mb-6">Tees</h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6">

    <!-- PRODUCT -->
    <div class="bg-neutral-900 p-6 rounded-xl text-center border">
      <img src="product4.jpg" class="h-48 mx-auto mb-4"/>
      <h3 class="font-bold">Didn’t Ask Tee</h3>

      <select id="size-1" class="w-full mb-2 bg-black border p-2">
        <option>Small</option><option>Medium</option><option>Large</option>
      </select>

      <select id="color-1" class="w-full mb-2 bg-black border p-2">
        <option>Black</option><option>White</option>
      </select>

      <p>$25</p>
      <button onclick="addConfiguredProduct('Didn’t Ask Tee',25,'size-1','color-1')" class="bg-orange-500 w-full py-2 mt-3 text-black font-bold">
        Add
      </button>
    </div>

  </div>
</section>

<!-- REVIEWS -->
<section class="max-w-4xl mx-auto px-6 pb-20">
  <h2 class="text-2xl font-black mb-4">Leave a Review</h2>

  <input id="review-name" placeholder="Name" class="w-full mb-2 p-2 bg-black border"/>
  <textarea id="review-text" placeholder="Review" class="w-full mb-2 p-2 bg-black border"></textarea>

  <!-- CAPTCHA -->
  <div class="g-recaptcha mb-4" data-sitekey="6LepSccsAAAAAGYaxwayLP-cKmuibgQm18IJ3mSv"></div>

  <button onclick="submitReview()" class="bg-orange-500 px-4 py-2 text-black font-bold">
    Submit Review
  </button>
</section>

<!-- CONTACT -->
<section class="max-w-4xl mx-auto px-6 pb-20">
  <h2 class="text-2xl font-black mb-4">Contact</h2>

  <input id="contact-name" placeholder="Name" class="w-full mb-2 p-2 bg-black border"/>
  <input id="contact-email" placeholder="Email" class="w-full mb-2 p-2 bg-black border"/>
  <textarea id="contact-message" placeholder="Message" class="w-full mb-2 p-2 bg-black border"></textarea>

  <!-- CAPTCHA -->
  <div class="g-recaptcha mb-4" data-sitekey="6LepSccsAAAAAGYaxwayLP-cKmuibgQm18IJ3mSv"></div>

  <button onclick="sendContactMessage()" class="bg-orange-500 px-4 py-2 text-black font-bold">
    Send
  </button>

  <p id="contact-status"></p>
</section>

<!-- CART -->
<section class="max-w-3xl mx-auto px-6 pb-20">
  <h2>Cart</h2>
  <ul id="cart-items"></ul>
  <p>Total: <span id="total">$0</span></p>
  <button onclick="checkout()">Checkout</button>
</section>

<script>
let cart = JSON.parse(localStorage.getItem('trulyBlissfulCart')) || [];

function saveCart(){
  localStorage.setItem('trulyBlissfulCart', JSON.stringify(cart));
}

function addConfiguredProduct(name, price, sizeId, colorId){
  const size = document.getElementById(sizeId).value;
  const color = document.getElementById(colorId).value;
  cart.push({name,price,size,color});
  saveCart();
}

async function submitReview(){
  const name = document.getElementById('review-name').value;
  const text = document.getElementById('review-text').value;
  const recaptchaToken = grecaptcha.getResponse(0);

  if(!recaptchaToken){
    alert('Complete captcha');
    return;
  }

  await fetch('/reviews',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,text,recaptchaToken})
  });

  alert('Review submitted');
}

async function sendContactMessage(){
  const name = document.getElementById('contact-name').value;
  const email = document.getElementById('contact-email').value;
  const message = document.getElementById('contact-message').value;
  const recaptchaToken = grecaptcha.getResponse(1);

  if(!recaptchaToken){
    alert('Complete captcha');
    return;
  }

  await fetch('/contact',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,email,message,recaptchaToken})
  });

  document.getElementById('contact-status').textContent = 'Sent';
}

function checkout(){
  fetch('/create-checkout-session',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cart})
  })
  .then(res=>res.json())
  .then(data=>{
    const stripe = Stripe('pk_test');
    stripe.redirectToCheckout({sessionId:data.id});
  });
}
</script>

</body>
</html>
